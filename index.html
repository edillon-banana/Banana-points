<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Banana Points 🍌</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 40px;
      background: #fff9db;
    }

    h1 {
      font-size: 32px;
    }

    .points-number {
      font-size: 40px;
      margin-top: 10px;
    }

    .banana-display {
      font-size: 28px;
      margin: 20px;
      line-height: 1.6;
      max-width: 90%;
      margin-left: auto;
      margin-right: auto;
      word-wrap: break-word;
    }

    button {
      font-size: 20px;
      margin: 10px;
      padding: 15px 25px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .add {
      background-color: #4CAF50;
      color: white;
    }

    .subtract {
      background-color: #f44336;
      color: white;
    }

    .reset {
      background-color: #888;
      color: white;
    }
  </style>
</head>
<body>

  <h1>🍌 Banana Points</h1>

  <div class="points-number" id="pointsNumber">0 points</div>

  <div class="banana-display" id="bananaDisplay"></div>

  <button class="add" onclick="changePoints(1)">+1 Banana</button>
  <button class="subtract" onclick="changePoints(-1)">-1 Banana</button>
  <br/>
  <button class="reset" onclick="resetPoints()">Reset</button>

  <script>
    let points = localStorage.getItem("bananaPoints") 
      ? parseInt(localStorage.getItem("bananaPoints")) 
      : 0;

    const pointsNumberEl = document.getElementById("pointsNumber");
    const bananaDisplayEl = document.getElementById("bananaDisplay");

    function updateDisplay() {
      pointsNumberEl.textContent = `${points} point${points === 1 ? "" : "s"}`;

      // Build banana visuals
      let bananas = "";
      for (let i = 0; i < points; i++) {
        bananas += "🍌 ";
      }

      bananaDisplayEl.textContent = bananas;

      localStorage.setItem("bananaPoints", points);
    }

    function changePoints(amount) {
      points = Math.max(0, points + amount); // prevents negative points
      updateDisplay();
    }

    function resetPoints() {
      points = 0;
      updateDisplay();
    }

    updateDisplay();
  </script>

</body>
</html>
